name: Daily Shareholder Report

on:
  schedule:
    - cron: "0 14 * * *"   # 14:00 UTC daily
  workflow_dispatch: {}     # allow manual runs

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet pillow

      - name: Generate report
        run: python report-bot/daily_report.py daily-holder-report

      - name: Commit if changed
        run: |
          git config user.name "mavrkofficial"
          git config user.email "210265409+mavrkofficial@users.noreply.github.com"
          git add daily-holder-report
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily \$CHILL shareholder report ($(date -u +%Y-%m-%d))"
            git push
          fi
